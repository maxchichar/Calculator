<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Maxchicha Calculator</title>
    </head>
    <style>
        /* Basic CSS layout */
        .calculator {
            width: 220px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background-color: lavender;
        }
        .display {
            grid-column: span 4;
            height: 50px;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            border: 1px solid purple;
        }
        button {
            height: 50px;
            font-size: 21px;
            color: purple;
        }
    </style>
    <body>
      <div class="calculator">
        <input type="text" class="display" id="display" disabled>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>/</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>*</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>-</button>

        <button>0</button>
        <button>.</button>
        <button>C</button>
        <button>+</button>
        <button>=</button>
      </div>

      <script>
        const display = document.getElementById("display");

        document.querySelectorAll("button").forEach(button => {
            button.addEventListener("click", () => {
                const value = button.textContent;

                if (value === "C") {
                    display.value = "";
                }
                else if (value === "=") {
                    display.value = eval(display.value);
                }
                else {
                    display.value += value;
                }
            })
        })
      </script>
    </body>
</html>
